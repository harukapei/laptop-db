<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台灣筆電資料庫｜Dell・HP・Lenovo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f4f0; --surface: #ffffff; --surface2: #f0efe9; --border: #e0ddd6;
  --text: #1a1916; --text2: #6b6860; --text3: #9b9890;
  --accent: #1a56db; --accent-bg: #eff4ff; --accent2: #e8470a;
  --dell: #007db8; --hp: #0096d6; --lenovo: #e2231a;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.06);
  --radius: 8px; --sidebar-w: 240px;
  --font: 'DM Sans', sans-serif; --mono: 'DM Mono', monospace;
}
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.5; }
#loadingScreen {
  position: fixed; inset: 0; background: #1a1916;
  display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; color: #fff;
}
.loading-logo { font-size: 18px; font-weight: 600; margin-bottom: 20px; }
.loading-bar { width: 200px; height: 3px; background: #333; border-radius: 3px; overflow: hidden; }
.loading-fill { height: 100%; background: var(--accent2); border-radius: 3px; animation: lp 1.4s ease-in-out infinite; }
@keyframes lp { 0%{width:0%;margin-left:0} 50%{width:60%;margin-left:20%} 100%{width:0%;margin-left:100%} }
.loading-sub { font-size: 12px; color: #666; margin-top: 12px; font-family: var(--mono); }

header {
  background: #1a1916; color: #fff; padding: 0 24px; height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #2d2b28;
}
.logo { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
.logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent2); flex-shrink: 0; }
.header-meta { font-size: 12px; color: #888; font-family: var(--mono); }
.btn-csv {
  display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px;
  border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer;
  background: transparent; color: #aaa; border: 1px solid #333;
  font-family: var(--font); transition: all .15s;
}
.btn-csv:hover { background: #2d2b28; color: #fff; }

.app { display: flex; height: calc(100vh - 56px); overflow: hidden; }

.sidebar {
  width: var(--sidebar-w); background: var(--surface);
  border-right: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; padding: 16px 0;
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.fs { padding: 0 16px 16px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
.fs:last-child { border-bottom: none; }
.fl { font-size: 10px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text3); margin-bottom: 8px; display: block; }
.search-box {
  width: 100%; padding: 8px 10px; border: 1px solid var(--border);
  border-radius: var(--radius); font-size: 13px; background: var(--surface2);
  color: var(--text); font-family: var(--font); transition: all .15s; outline: none;
}
.search-box:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg); background: #fff; }
.search-box::placeholder { color: var(--text3); }
.pill-group { display: flex; flex-wrap: wrap; gap: 6px; }
.pill {
  padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500;
  cursor: pointer; border: 1.5px solid var(--border); background: var(--surface2);
  color: var(--text2); transition: all .15s; user-select: none;
}
.pill:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
.pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.pill.active.p-dell { background: var(--dell); border-color: var(--dell); }
.pill.active.p-hp { background: var(--hp); border-color: var(--hp); }
.pill.active.p-lenovo { background: var(--lenovo); border-color: var(--lenovo); }
.reset-btn {
  width: 100%; padding: 8px; background: transparent; border: 1.5px solid var(--border);
  border-radius: var(--radius); color: var(--text2); font-size: 12px; font-weight: 500;
  cursor: pointer; font-family: var(--font); transition: all .15s; margin-top: 8px;
}
.reset-btn:hover { background: #fee2e2; border-color: #fca5a5; color: #dc2626; }

.stats-bar {
  padding: 10px 20px; background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 20px; flex-shrink: 0;
}
.stat-chip { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
.stat-num { font-size: 15px; font-weight: 600; color: var(--text); font-family: var(--mono); }
.sdiv { width: 1px; height: 20px; background: var(--border); }
.bdot { width: 6px; height: 6px; border-radius: 50%; }
.bd-dell { background: var(--dell); } .bd-hp { background: var(--hp); } .bd-lenovo { background: var(--lenovo); }
.view-toggle { margin-left: auto; display: flex; gap: 4px; }
.view-btn {
  padding: 5px 10px; border-radius: 5px; font-size: 12px; font-weight: 500;
  cursor: pointer; border: 1px solid var(--border); background: transparent;
  color: var(--text2); font-family: var(--font); transition: all .15s;
}
.view-btn.active { background: var(--text); color: #fff; border-color: var(--text); }

.main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
.content-wrap { flex: 1; overflow: hidden; display: flex; }
.content { flex: 1; overflow-y: auto; padding: 16px; }
.content::-webkit-scrollbar { width: 6px; }
.content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }

.table-wrap { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
table { width: 100%; border-collapse: collapse; }
thead { background: var(--surface2); }
th {
  padding: 10px 12px; text-align: left; font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .6px; color: var(--text3);
  white-space: nowrap; border-bottom: 1px solid var(--border);
  cursor: pointer; user-select: none; transition: color .15s;
}
th:hover, th.sorted { color: var(--accent); }
td {
  padding: 10px 12px; font-size: 13px; border-bottom: 1px solid var(--surface2);
  white-space: nowrap; max-width: 200px; overflow: hidden; text-overflow: ellipsis;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--accent-bg); cursor: pointer; }
tr.selected td { background: #dbeafe; }

.bt { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.bt-dell { background: #e8f4fb; color: var(--dell); }
.bt-hp { background: #e6f5fc; color: var(--hp); }
.bt-lenovo { background: #fde8e7; color: var(--lenovo); }
.st { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 500; }
.st-consumer { background: #d8f3dc; color: #2d6a4f; }
.st-gaming { background: #fde8e8; color: #9b2226; }
.st-commercial { background: #dbe4f0; color: #1d3557; }
.st-ws { background: #f3e5f5; color: #6a0572; }
.sts { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 500; }
.sts-on { background: #d8f3dc; color: #2d6a4f; }
.sts-off { background: #f5f5f4; color: var(--text3); }
.sts-soon { background: #fef3c7; color: #92400e; }
.rt { font-family: var(--mono); font-size: 11px; color: var(--text3); background: var(--surface2); padding: 2px 6px; border-radius: 4px; }
.ptw { color: var(--text); font-family: var(--mono); font-size: 12px; }
.pus { color: var(--text3); font-family: var(--mono); font-size: 11px; }

.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; cursor: pointer; transition: all .15s; }
.card:hover { box-shadow: var(--shadow); border-color: var(--accent); }
.card.selected { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg); }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.card-model { font-size: 13px; font-weight: 600; color: var(--text); margin: 6px 0 2px; line-height: 1.3; }
.card-meta { font-size: 11px; color: var(--text3); }
.card-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 10px; }
.cs { background: var(--surface2); border-radius: 5px; padding: 6px 8px; }
.csl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; }
.csv2 { font-size: 12px; font-weight: 500; color: var(--text); font-family: var(--mono); margin-top: 1px; }
.card-price { font-size: 13px; font-weight: 600; color: var(--accent); font-family: var(--mono); margin-top: 10px; }

.detail-panel { width: 320px; flex-shrink: 0; background: var(--surface); border-left: 1px solid var(--border); overflow-y: auto; display: none; }
.detail-panel.open { display: flex; flex-direction: column; }
.detail-panel::-webkit-scrollbar { width: 4px; }
.detail-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.dp-hdr { padding: 16px; border-bottom: 1px solid var(--border); position: relative; }
.dp-brow { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
.dp-mdl { font-size: 16px; font-weight: 600; line-height: 1.3; }
.dp-ser { font-size: 12px; color: var(--text3); margin-top: 2px; }
.dp-price { margin-top: 12px; padding: 10px 12px; background: var(--surface2); border-radius: 6px; }
.dp-ptw { font-size: 17px; font-weight: 700; font-family: var(--mono); }
.dp-pus { font-size: 12px; color: var(--text3); font-family: var(--mono); margin-top: 2px; }
.dp-close {
  position: absolute; top: 12px; right: 12px; background: var(--surface2);
  border: none; cursor: pointer; width: 24px; height: 24px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; color: var(--text3);
  font-size: 14px; transition: all .15s; line-height: 1;
}
.dp-close:hover { background: var(--border); color: var(--text); }
.dp-body { padding: 16px; flex: 1; }
.dp-sec { margin-bottom: 20px; }
.dp-sec-title { font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--surface2); }
.dp-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 5px 0; gap: 10px; }
.dp-row + .dp-row { border-top: 1px solid var(--surface2); }
.dp-k { font-size: 12px; color: var(--text3); flex-shrink: 0; }
.dp-v { font-size: 12px; font-weight: 500; color: var(--text); text-align: right; line-height: 1.4; }
.dp-act { padding: 0 16px 16px; }
.dp-link {
  display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%;
  padding: 9px 14px; background: var(--accent); color: #fff; border-radius: 6px;
  text-decoration: none; font-size: 13px; font-weight: 500; transition: background .15s;
}
.dp-link:hover { background: #1648c4; }

.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; color: var(--text3); }
.ei { font-size: 36px; margin-bottom: 12px; }
.et { font-size: 15px; font-weight: 500; margin-bottom: 6px; color: var(--text2); }
</style>
</head>
<body>
<div id="loadingScreen">
  <div class="loading-logo">🗂 台灣筆電資料庫</div>
  <div class="loading-bar"><div class="loading-fill"></div></div>
  <div class="loading-sub">載入資料中…</div>
</div>

<header>
  <div class="logo"><div class="logo-dot"></div>台灣筆電資料庫</div>
  <div class="header-meta">Dell · HP · Lenovo &nbsp;|&nbsp; <span id="hTotal">—</span> 筆</div>
  <button class="btn-csv" onclick="exportCSV()">⬇ 匯出 CSV</button>
</header>

<div class="app">
  <aside class="sidebar">
    <div class="fs"><span class="fl">搜尋</span><input type="text" class="search-box" id="searchBox" placeholder="型號、系列關鍵字…" oninput="applyFilters()"></div>
    <div class="fs"><span class="fl">品牌</span><div class="pill-group" id="brandPills"></div></div>
    <div class="fs"><span class="fl">狀態</span><div class="pill-group" id="statusPills"></div></div>
    <div class="fs"><span class="fl">市場</span><div class="pill-group" id="regionPills"></div></div>
    <div class="fs"><span class="fl">客群</span><div class="pill-group" id="segPills"></div></div>
    <div class="fs"><span class="fl">螢幕尺寸</span><div class="pill-group" id="screenPills"></div></div>
    <div class="fs"><span class="fl">CPU 平台</span><div class="pill-group" id="cpuPills"></div></div>
    <div class="fs"><span class="fl">顯示晶片</span><div class="pill-group" id="gpuPills"></div></div>
    <div class="fs"><span class="fl">Form Factor</span><div class="pill-group" id="formPills"></div></div>
    <div class="fs"><button class="reset-btn" onclick="resetFilters()">✕ 重設所有篩選</button></div>
  </aside>

  <div class="main">
    <div class="stats-bar">
      <div class="stat-chip"><span class="stat-num" id="sCnt">0</span><span>筆結果</span></div>
      <div class="sdiv"></div>
      <div class="stat-chip"><div class="bdot bd-dell"></div>Dell <b id="sDell">0</b></div>
      <div class="stat-chip"><div class="bdot bd-hp"></div>HP <b id="sHp">0</b></div>
      <div class="stat-chip"><div class="bdot bd-lenovo"></div>Lenovo <b id="sLv">0</b></div>
      <div class="view-toggle">
        <button class="view-btn active" id="btnTbl" onclick="setView('table')">表格</button>
        <button class="view-btn" id="btnCrd" onclick="setView('card')">卡片</button>
      </div>
    </div>
    <div class="content-wrap">
      <div class="content" id="mc"></div>
      <div class="detail-panel" id="dp">
        <div class="dp-hdr">
          <button class="dp-close" onclick="closeDetail()">✕</button>
          <div class="dp-brow" id="dpBrow"></div>
          <div class="dp-mdl" id="dpMdl"></div>
          <div class="dp-ser" id="dpSer"></div>
          <div class="dp-price"><div class="dp-ptw" id="dpPtw"></div><div class="dp-pus" id="dpPus"></div></div>
        </div>
        <div class="dp-body" id="dpBdy"></div>
        <div class="dp-act" id="dpAct"></div>
      </div>
    </div>
  </div>
</div>

<script>
let ALL=[],FD=[],selIdx=null,curView='table',sortC=null,sortD=1;
const F={search:'',brand:[],status:[],region:[],segment:[],screen:[],cpu:[],gpu:[],form:[]};

fetch('data.json')
  .then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
  .then(d=>{ ALL=d; document.getElementById('hTotal').textContent=ALL.length; document.getElementById('loadingScreen').style.display='none'; initPills(); apply(); })
  .catch(e=>{ document.getElementById('loadingScreen').innerHTML='<div style="color:#f87171;padding:20px;text-align:center">資料載入失敗<br><small>'+e.message+'</small></div>'; });

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function mkPills(id,key,vals,cls){
  document.getElementById(id).innerHTML=vals.map(v=>`<div class="pill ${cls?cls(v):''}" onclick="togPill(this,'${key}','${v.replace(/'/g,"\\'")}')">${esc(v)}</div>`).join('');
}
function initPills(){
  mkPills('brandPills','brand',['Dell','HP','Lenovo'],v=>'p-'+v.toLowerCase());
  mkPills('statusPills','status',['在售','停售/改名','即將推出']);
  mkPills('regionPills','region',['TW','TW/US','US']);
  mkPills('segPills','segment',['Consumer','Gaming','Commercial','Mobile WS']);
  const sc=[...new Set(ALL.map(d=>d.screen_size).filter(v=>v&&v!=='—'))].sort((a,b)=>parseFloat(a)-parseFloat(b));
  mkPills('screenPills','screen',sc);
  mkPills('cpuPills','cpu',['Intel','AMD','Qualcomm']);
  mkPills('gpuPills','gpu',['iGPU','dGPU','iGPU/dGPU']);
  mkPills('formPills','form',['Clamshell','2-in-1']);
}
function togPill(el,key,val){
  const a=F[key],i=a.indexOf(val);
  if(i===-1){a.push(val);el.classList.add('active');}else{a.splice(i,1);el.classList.remove('active');}
  apply();
}
function resetFilters(){
  Object.keys(F).forEach(k=>Array.isArray(F[k])?F[k]=[]:F[k]='');
  document.getElementById('searchBox').value='';
  document.querySelectorAll('.pill.active').forEach(p=>p.classList.remove('active'));
  apply();
}
function apply(){
  F.search=document.getElementById('searchBox').value.toLowerCase();
  FD=ALL.filter(d=>{
    if(F.brand.length&&!F.brand.includes(d.brand))return false;
    if(F.status.length&&!F.status.includes(d.status))return false;
    if(F.region.length&&!F.region.includes(d.region))return false;
    if(F.segment.length&&!F.segment.includes(d.segment))return false;
    if(F.screen.length&&!F.screen.includes(d.screen_size))return false;
    if(F.form.length&&!F.form.includes(d.form_factor))return false;
    if(F.cpu.length&&!F.cpu.some(c=>d.cpu_platform&&d.cpu_platform.includes(c)))return false;
    if(F.gpu.length&&!F.gpu.includes(d.gpu_type))return false;
    if(F.search){const h=[d.brand,d.series,d.model,d.generation,d.segment].join(' ').toLowerCase();if(!h.includes(F.search))return false;}
    return true;
  });
  if(sortC){
    FD.sort((a,b)=>{
      let av=a[sortC]||'',bv=b[sortC]||'';
      const an=parseFloat(String(av).replace(/[^0-9.]/g,'')),bn=parseFloat(String(bv).replace(/[^0-9.]/g,''));
      if(!isNaN(an)&&!isNaN(bn))return(an-bn)*sortD;
      return String(av).localeCompare(String(bv),'zh')*sortD;
    });
  }
  document.getElementById('sCnt').textContent=FD.length;
  document.getElementById('sDell').textContent=FD.filter(d=>d.brand==='Dell').length;
  document.getElementById('sHp').textContent=FD.filter(d=>d.brand==='HP').length;
  document.getElementById('sLv').textContent=FD.filter(d=>d.brand==='Lenovo').length;
  render();
}
function setsort(c){if(sortC===c)sortD*=-1;else{sortC=c;sortD=1;}apply();}
function setView(v){curView=v;document.getElementById('btnTbl').classList.toggle('active',v==='table');document.getElementById('btnCrd').classList.toggle('active',v==='card');render();}

function bTag(b){const m={Dell:'bt-dell',HP:'bt-hp',Lenovo:'bt-lenovo'};return`<span class="bt ${m[b]||''}">${esc(b)}</span>`;}
function sTag(s){const m={Consumer:'st-consumer',Gaming:'st-gaming',Commercial:'st-commercial','Mobile WS':'st-ws'};return`<span class="st ${m[s]||''}">${esc(s)}</span>`;}
function stag(s){const c=s==='在售'?'sts-on':s==='即將推出'?'sts-soon':'sts-off';return`<span class="sts ${c}">${esc(s)}</span>`;}

const COLS=[
  {k:'brand',l:'品牌',f:d=>bTag(d.brand)},
  {k:'model',l:'型號',f:d=>`<span title="${esc(d.model)}">${esc(d.model)}</span>`},
  {k:'segment',l:'客群',f:d=>sTag(d.segment)},
  {k:'status',l:'狀態',f:d=>stag(d.status)},
  {k:'region',l:'市場',f:d=>`<span class="rt">${esc(d.region)}</span>`},
  {k:'screen_size',l:'螢幕',f:d=>esc(d.screen_size)},
  {k:'weight_g',l:'重量(g)',f:d=>esc(d.weight_g)},
  {k:'battery_wh',l:'電池(Wh)',f:d=>esc(d.battery_wh)},
  {k:'cpu_platform',l:'CPU',f:d=>esc(d.cpu_platform)},
  {k:'gpu_type',l:'GPU',f:d=>esc(d.gpu_type)},
  {k:'price_tw',l:'NT$ MSRP',f:d=>d.price_tw?`<span class="ptw">NT$${esc(String(d.price_tw))}</span>`:'—'},
  {k:'price_us',l:'US$ MSRP',f:d=>d.price_us?`<span class="pus">$${esc(String(d.price_us))}</span>`:'—'},
];

function render(){if(curView==='table')renderTbl();else renderCrd();}
function renderTbl(){
  if(!FD.length){renderEmpty();return;}
  const ths=COLS.map(c=>`<th class="${sortC===c.k?'sorted':''}" onclick="setsort('${c.k}')">${c.l}${sortC===c.k?(sortD===1?' ↑':' ↓'):''}</th>`).join('');
  const trs=FD.map((d,i)=>`<tr class="${i===selIdx?'selected':''}" onclick="selItem(${i})">${COLS.map(c=>`<td>${c.f(d)}</td>`).join('')}</tr>`).join('');
  document.getElementById('mc').innerHTML=`<div class="table-wrap"><table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table></div>`;
}
function renderCrd(){
  if(!FD.length){renderEmpty();return;}
  const h=FD.map((d,i)=>`<div class="card ${i===selIdx?'selected':''}" onclick="selItem(${i})">
    <div class="card-top"><div>${bTag(d.brand)} ${sTag(d.segment)}</div><span class="rt">${esc(d.region)}</span></div>
    <div class="card-model">${esc(d.model)}</div>
    <div class="card-meta">${esc(d.series)} · ${esc(d.screen_size)} · ${stag(d.status)}</div>
    <div class="card-stats">
      <div class="cs"><div class="csl">重量</div><div class="csv2">${esc(d.weight_g)||'—'}g</div></div>
      <div class="cs"><div class="csl">電池</div><div class="csv2">${esc(d.battery_wh)||'—'}Wh</div></div>
      <div class="cs"><div class="csl">CPU</div><div class="csv2">${esc(d.cpu_platform)||'—'}</div></div>
      <div class="cs"><div class="csl">GPU</div><div class="csv2">${esc(d.gpu_type)||'—'}</div></div>
    </div>
    ${d.price_tw?`<div class="card-price">NT$${esc(String(d.price_tw))}</div>`:''}
  </div>`).join('');
  document.getElementById('mc').innerHTML=`<div class="card-grid">${h}</div>`;
}
function renderEmpty(){document.getElementById('mc').innerHTML=`<div class="empty-state"><div class="ei">🔍</div><div class="et">沒有符合條件的資料</div><div>請調整篩選條件後再試</div></div>`;}

function selItem(i){
  selIdx=i;const d=FD[i];
  document.getElementById('dpBrow').innerHTML=bTag(d.brand)+' '+sTag(d.segment)+' '+`<span class="rt">${esc(d.region)}</span>`;
  document.getElementById('dpMdl').textContent=d.model;
  document.getElementById('dpSer').textContent=d.series+(d.year?' · '+d.year:'');
  document.getElementById('dpPtw').textContent=d.price_tw?'NT$ '+d.price_tw:'—';
  document.getElementById('dpPus').textContent=d.price_us?'US$ '+d.price_us:'';
  function r(l,v){if(!v||v==='—'||v==='')return'';return`<div class="dp-row"><span class="dp-k">${esc(l)}</span><span class="dp-v">${esc(String(v))}</span></div>`;}
  document.getElementById('dpBdy').innerHTML=`
    <div class="dp-sec"><div class="dp-sec-title">螢幕</div>${r('尺寸',d.screen_size)}${r('種類',d.display_type)}${r('解析度',d.resolution)}${r('Form Factor',d.form_factor)}</div>
    <div class="dp-sec"><div class="dp-sec-title">效能</div>${r('CPU',d.cpu_platform)}${r('GPU',d.gpu_type)}${r('dGPU',d.dgpu_model)}</div>
    <div class="dp-sec"><div class="dp-sec-title">機身尺寸</div>${r('重量',d.weight_g?d.weight_g+' g':'')}${r('寬',d.width_mm?d.width_mm+' mm':'')}${r('長',d.depth_mm?d.depth_mm+' mm':'')}${r('厚',d.thickness_mm?d.thickness_mm+' mm':'')}</div>
    <div class="dp-sec"><div class="dp-sec-title">電力・周邊</div>${r('電池',d.battery_wh?d.battery_wh+' Wh':'')}${r('前鏡頭',d.webcam)}${r('數字鍵區',d.numpad)}${r('左側 I/O',d.io_left)}${r('右側 I/O',d.io_right)}</div>
    <div class="dp-sec"><div class="dp-sec-title">上市資訊</div>${r('年份',d.year)}${r('世代',d.generation)}${r('最後核實',d.last_verified)}</div>`;
  document.getElementById('dpAct').innerHTML=d.url?`<a href="${esc(d.url)}" target="_blank" rel="noopener" class="dp-link">前往官方網頁 ↗</a>`:'';
  document.getElementById('dp').classList.add('open');
  render();
}
function closeDetail(){selIdx=null;document.getElementById('dp').classList.remove('open');render();}

function exportCSV(){
  if(!FD.length)return;
  const k=Object.keys(FD[0]);
  const csv=[k,...FD.map(d=>k.map(kk=>'"'+String(d[kk]||'').replace(/"/g,'""')+'"'))].map(r=>r.join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download='台灣筆電資料庫.csv'; a.click();
}
</script>
</body>
</html>
